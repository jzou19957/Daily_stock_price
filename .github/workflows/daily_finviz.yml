name: Daily Finviz Scrape → Google Drive

# ─────────────────────────────────────────────────────────────────────────────
# SCHEDULE  (UTC — GitHub Actions cron is always UTC)
#   5:05 PM ET  = 21:05 UTC  (ET is UTC-4 in summer, UTC-5 in winter)
#
#   Slot 1 : 21:05 UTC ≈ 5:05 PM ET   ← first attempt
#   Slot 2 : 22:05 UTC ≈ 6:05 PM ET   ← retry if slot 1 failed
#   Slot 3 : 23:05 UTC ≈ 7:05 PM ET   ← retry if slot 2 failed
#   Slot 4 : 00:05 UTC ≈ 8:05 PM ET   ← retry (next UTC day, Tue–Sat)
#   Slot 5 : 01:05 UTC ≈ 9:05 PM ET   ← final retry (opens Issue on failure)
#
#   run_daily.py checks Drive at the start of every run.
#   If today's file is already there it exits 0 immediately — no wasted work.
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: "5 21 * * 1-5"    # ~5:05 PM ET  — first attempt
    - cron: "5 22 * * 1-5"    # ~6:05 PM ET  — retry 1
    - cron: "5 23 * * 1-5"    # ~7:05 PM ET  — retry 2
    - cron: "5 0  * * 2-6"    # ~8:05 PM ET  — retry 3
    - cron: "5 1  * * 2-6"    # ~9:05 PM ET  — retry 4 (final)

  workflow_dispatch:
    inputs:
      pages:
        description: "Pages per view — blank=full run, 3=quick test"
        required: false
        default: ""
      force:
        description: "Re-run even if today's file is already on Drive"
        type: boolean
        default: false

jobs:
  scrape-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ─────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Run — check Drive, scrape, upload ──────────────────────────────
      # run_daily.py handles everything internally:
      #   • Connects to Drive and checks if today's file already exists
      #   • If yes  → exits 0 cleanly  (job passes, nothing uploaded again)
      #   • If no   → scrapes Finviz, uploads CSV, exits 0
      #   • On any error → exits 1  (job fails, next hourly slot retries)
      - name: Scrape Finviz and upload to Google Drive
        id: scrape
        env:
          GDRIVE_FOLDER_ID:   ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.pages }}" ]; then
            ARGS="$ARGS --pages ${{ github.event.inputs.pages }}"
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          python run_daily.py $ARGS

      # ── 5. Save log as artifact ───────────────────────────────────────────
      - name: Upload scraper log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "log-${{ github.run_id }}-attempt-${{ github.run_attempt }}"
          path: "*.log"
          retention-days: 14
          if-no-files-found: ignore

      # ── 6. Open Issue if FINAL retry slot fails ───────────────────────────
      - name: Open failure alert issue
        if: failure() && github.event.schedule == '5 1 * * 2-6'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const title = `🚨 Finviz scrape FAILED — ${today}`;
            const body = [
              `## All 5 retry attempts failed on ${today}`,
              ``,
              `Attempts ran from ~5 PM to ~9 PM ET — all failed.`,
              ``,
              `**Run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              ``,
              `### Common causes`,
              `- Finviz blocked requests (HTTP 403) — try increasing delay`,
              `- Google Drive credentials expired`,
              `- Job hit the 90-minute timeout`,
              ``,
              `### To fix`,
              `1. Check the log artifact on the run linked above`,
              `2. Fix the issue`,
              `3. Go to **Actions → Daily Finviz Scrape → Run workflow**`,
              ``,
              `_Auto-opened by GitHub Actions_`,
            ].join('\n');
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'scrape-failure',
            });
            if (!issues.data.some(i => i.title === title)) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['scrape-failure'],
              });
            }